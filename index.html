<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morse Games</title>
  </head>
  <body>
    <header class="app-header">
      <h1>Morse Games</h1>
      <p class="tagline">Ham-centric CW training</p>
    </header>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="random-run">Random Run</button>
      <button class="tab" data-tab="word-wrangler">Word Wrangler</button>
      <button class="tab" data-tab="contest">Contest</button>
      <button class="tab" data-tab="reading">Reading</button>
      <button class="tab" data-tab="adventure">Adventure</button>
    </nav>

    <main id="mode-root"></main>

    <footer class="app-footer">
      <p class="feedback-line">
        <!-- TODO: swap in a real dedicated feedback address before public launch (see TERMS.md). -->
        <a class="feedback-link" href="mailto:feedback@example.com?subject=Morse%20Games%20feedback">Send Feedback</a>
        <span class="footer-sep">·</span>
        <button type="button" class="feedback-link link-btn" id="terms-link">Terms &amp; Disclaimer</button>
        <span class="feedback-caption"
          >Opens your email app — sending reveals your email address to us, the same as emailing anyone
          directly.</span
        >
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
